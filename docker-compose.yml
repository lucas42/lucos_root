services:
  root:
    build: .
    container_name: lucos_root
    ports: 
      - $PORT:80
    image: lucas42/lucos_root:${VERSION:-latest}
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s