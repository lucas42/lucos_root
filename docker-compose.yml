services:
  root:
    build: .
    container_name: lucos_root_app
    ports:
      - $PORT:$PORT
    image: lucas42/lucos_root_app:${VERSION:-latest}
    restart: always
    environment:
      - SYSTEM
      - PORT
      - APP_ORIGIN  # reserved: used by future auth middleware (lucos_root#135)
      - LOGANNE_ENDPOINT
    healthcheck:
      test: ["CMD", "/lucos_root", "--healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
